<!doctype html>
<html>
  <head>
    <title>State and Event Handlers</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script type="text/babel">
      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);

      function Para({ name }) {
        return <p>Hello {name}</p>;
      }

      function Button({ setName, functionality }) {
        return (
          <>
            {functionality === "reset" && (
              <button onClick={() => setName("")}>Reset</button>
            )}
            {functionality === "example" && (
              <button onClick={() => setName("Alice")}>Example</button>
            )}
          </>
        );
      }

      function App() {
        const [name, setName] = React.useState("");

        function changeName(e) {
          setName(e.target.value);
        }

        return (
          <>
            <input type="text" onChange={changeName} name={name}></input>
            <Button setName={setName} functionality="reset" />
            <Button setName={setName} functionality="example" />
            <Para name={name}></Para>
          </>
        );
      }

      root.render(<App />);
    </script>
  </body>
</html>
